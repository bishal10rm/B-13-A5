<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Github Issues Tracker login</title>
     <style>
        *{
          font-family: "Geist", sans-serif;   
        }
     </style>
    <!-- google-font cdn  -->
       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
       <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind+daisyUi cdn -->
       <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
       <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
 <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <!-- login interface -->
     <section>
        <div class="logo w-[200px] mx-44 pt-32">
            <img src="assets/github-logo.png">
        </div>
        <div class="text-center">
            <h2 class="text-[24px] font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[16px] text-#64748B">Sign in to manage your issues</p>
        </div>

        <div>
            <fieldset class="fieldset border-base-300 mx-auto rounded-box w-xs border p-4">
                <legend class="fieldset-legend"></legend>
              
                <label class="label">Username</label>
                <input type="text" id="input-user" class="input" placeholder="Enter Username" />
              
                <label class="label">Password</label>
                <input type="password" id="input-password" class="input" placeholder="Enter Password" />
              
                <button id="btn-signin"class="btn btn-neutral mt-4">Sign In</button>
              </fieldset>
        </div>
    </section>
    
    <script src="login.js"></script>
</body>
</html>
