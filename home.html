<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker </title>

     <!-- google-font cdn  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
     <!-- font awsome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
     <!-- Tailwind+daisyUi cdn -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="container mx-auto">
    <nav>
        <div class=" bg-base-200 flex justify-between p-5">
            <div logo class="flex  items-center">
                <img  class="w-[36px]" src="assets/github-logo.png">
                <h2 class="text-[24px]  font-semibold ">GitHub Issues Tracker</h2>
            </div>
        
            <div class="flex  items-center gap-4">
                <input type="Search" placeholder="Search issues"/>
                <button class="btn btn-info">Search</button>
            </div>
        </div>
    </nav>

    <section>
     <div class="tabs tabs-box mt-5">
      <input type="radio" name="my_tabs_6" class="tab" aria-label="All" checked="checked" />
      <input type="radio" name="my_tabs_6" class="tab" aria-label="Opend"  />
      <input type="radio" name="my_tabs_6" class="tab" aria-label="Closed" />  
     </div>
    </section><br>

    <section>
        <div class="bg-base-200 flex justify-between mt-5">
            <div class=" flex items-center "> 
                <img class="w-[50px] "src="assets/Aperture.png">
            </div>

            <div class="flex flex-col pr-145">
                <h3 class="text-[20px] font-semibold">50 Issues</h3>
                <p class="">Track and manage your project issues</p>
            </div>
           
            <div class="flex items-baseline pt-5 ">
                <i class="fa-solid fa-circle text-green-500"></i><p>Open</p>
                <i class="fa-solid fa-circle text-purple-500"></i><p>Closed</p>
            </div>
          
        </div>
    </section>
     
    <section>
        <div id="cardsContainer" class="card bg-white container max-auto grid grid-cols-1 sm:grid-cols-4 gap-4">
           
        </div>
          
    </section>
    
    <script src="script.js"></script>
</body>
</html>
